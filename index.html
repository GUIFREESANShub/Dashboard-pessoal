<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pessoal| SENAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="Dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <I class="fas fa-chart-line"> </I>
                    <span>AdminPro</span>
                </div>
                <button class="sidebat-toggle" id="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li> 
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-users"></i>
                            <span>Usuários</span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-shopping-cart"></i>
                            <span>Vendas<span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-chart-bar"></i>
                            <span>Relatório</span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-cog"></i>
                            <span>Configurações</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#">
                    <i class="fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                </a>
            </div>
        </aside>
        <div class="main-content">
            <header class="topbar">
                <div class="search-area">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Pesquisar....">
                </div>
                <div class="user-area">
                    <button class="dark-mode-toogle" id="darkModeToogle">
                        <i class="fa-moon"></i>
                    </button>
                    <div class="notification">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                     </div>
                     <div class="user-profile">
                         <img src="https://pbs.twimg.com/media/E-w6D88XMAAzlqL.jpg" width="500">
                         <span>Guilherme frigeri</span>
                         <i class="fa-chervron-down"></i>
                    </div>
                </div>
            </header>
            <main>
                <div class="page-header">
                    <h1>Dashboard</h1>
                    <p>Bem-vindo de volta, Guilherme! Aqui está o resumo do seu negócio</p>
                </div>
                <div class="cards-gird">
                    <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="card-info">
                            <h3>Faturamento</h3>
                            <p class="value">67.676,67</p>
                            <span>+24,5%</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
